opacity: 1 !important;

button, input[type="range"] {

}
/* ツールボタンの親コンテナの調整 */

<body>

    <h1>ぬりえお絵描きボード</h1>

<div class="canvas-container" id="canvasWrapper">

</div>

        <button id="eraserBtn" class="mode-btn">消し</button>
        <button id="clearBtn" style="grid-column: span 2;">全消去</button>

    <div class="size-container">
        <input type="range" id="brushSize" min="1" max="50" value="8" style="flex:1;">
        <span id="sizeVal">8</span>px
    </div>

    <script>

// --- 変数の宣言 ---
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const lineCanvas = document.getElementById('lineCanvas');
const lineCtx = lineCanvas.getContext('2d', { willReadFrequently: true });

const canvasWrapper = document.getElementById('canvasWrapper');

const currentColorEl = document.getElementById('currentColor');
const brushSizeInput = document.getElementById('brushSize');
const sizeValEl = document.getElementById('sizeVal');

const brushBtn = document.getElementById('brushBtn');
const floodFillBtn = document.getElementById('floodFillBtn');
const eraserBtn = document.getElementById('eraserBtn');
const clearBtn = document.getElementById('clearBtn');

const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');

const fileInput = document.getElementById('fileInput');

let currentMode = 'brush'; 
let isDrawing = false;
let selectedColor = '#FF0000';
let brushSize = 8;

let isPinching = false; // ピンチ中かどうかを判定するフラグ

let resizeTimer;

let historyStack = [];
let historyIndex = -1;
const maxHistory = 20;

function setAppHeight() {
    const doc = document.documentElement;
    // 現在のウィンドウの高さを取得してCSS変数に代入
    doc.style.setProperty('--app-height', `${window.innerHeight}px`);
}

window.addEventListener('resize', setAppHeight);
setAppHeight();


function resizeCanvas() {
    const containerW = canvasWrapper.clientWidth;
    const containerH = canvasWrapper.clientHeight;
    if (containerW === 0 || containerH === 0) return;

    // 1. 内容を保持
    const tempPaint = document.createElement('canvas');
    tempPaint.width = canvas.width;
    tempPaint.height = canvas.height;
    tempPaint.getContext('2d').drawImage(canvas, 0, 0);

    const tempLine = document.createElement('canvas');
    tempLine.width = lineCanvas.width;
    tempLine.height = lineCanvas.height;
    tempLine.getContext('2d').drawImage(lineCanvas, 0, 0);

    // 2. サイズをコンテナに合わせる（シンプルに戻す）
    canvas.width = containerW;
    canvas.height = containerH;
    lineCanvas.width = containerW;
    lineCanvas.height = containerH;

    // 3. 再描画
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, containerW, containerH);
    ctx.drawImage(tempPaint, 0, 0, tempPaint.width, tempPaint.height, 0, 0, containerW, containerH);
    lineCtx.drawImage(tempLine, 0, 0, tempLine.width, tempLine.height, 0, 0, containerW, containerH);
}

window.addEventListener('load', () => {
    setTimeout(() => {
        resizeCanvas();
    }, 100);
});

// --- 描画・操作 ---

function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // 画面上の表示サイズ(rect.width)と実際のcanvasサイズ(canvas.width)の比率で補正
    return { 
        x: (clientX - rect.left) * (canvas.width / rect.width), 
        y: (clientY - rect.top) * (canvas.height / rect.height) 
    };
}




// --- 修正版：描画開始処理 ---

function handleStart(e) {
    if (currentMode === 'eyedropper') { return; }
    if (currentMode === 'fill') {
        const pos = getCanvasPos(e);
        const rgb = hexToRgb(selectedColor); // ←ここを hexToRgb に書き換える

        floodFill(Math.floor(pos.x), Math.floor(pos.y), rgb);
        return;
    }

    const pos = getCanvasPos(e);
    isDrawing = true;
    
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = currentMode === 'eraser' ? '#ffffff' : selectedColor;
    
    // --- 【追加】点描画の処理 ---
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
    ctx.fillStyle = ctx.strokeStyle; // 線と同じ色で塗りつぶす
    ctx.fill(); 
    // --- ここまで ---
    
    ctx.beginPath(); // 連続線のための準備
    ctx.moveTo(pos.x, pos.y);
}






// --- 修正版：描画移動処理 ---
function handleMove(e) {
    if (!isDrawing) return; 
    e.preventDefault(); // スクロール防止

    const pos = getCanvasPos(e);
    
    // 前の点から今の位置まで線を引き、実際に描画する
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}






function handleEnd(e) {
    // 1. タイマーが動いていれば停止（長押し中だった場合）
    clearTimeout(longPressTimer); 

    // スポイト確定処理（handleEnd 内）
    if (currentMode === 'eyedropper') {
        const pos = getCanvasPos(e.changedTouches ? e.changedTouches[0] : e);
        const pixel = ctx.getImageData(pos.x, pos.y, 1, 1).data;
        selectedColor = `rgb(${pixel[0]},${pixel[1]},${pixel[2]})`;
        currentColorEl.style.backgroundColor = selectedColor;
        
        return;
    }


    
    if (isDrawing) { isDrawing = false; ctx.beginPath(); saveHistory(); }
}



// 既存の setMode を置き換え
function setMode(mode) {
    currentMode = mode;
    brushBtn.classList.toggle('active', mode === 'brush');
    floodFillBtn.classList.toggle('active', mode === 'fill');
    eraserBtn.classList.toggle('active', mode === 'eraser');
}


function saveHistory() {
    if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
    historyStack.push(canvas.toDataURL());
    if (historyStack.length > maxHistory) historyStack.shift();
    historyIndex = historyStack.length - 1;
    updateHistoryButtons();
}

function updateHistoryButtons() {
    undoBtn.disabled = historyIndex <= 0;
    redoBtn.disabled = historyIndex >= historyStack.length - 1;
}

// --- イベントリスナー ---
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleEnd);

// ピンチ操作用の変数
let scale = 1;
let lastDist = 0;

function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

// --- イベントリスナーをこちらに差し替えてください ---

let touchTimer = null; // タイマー用の変数を追加

// 移動用の変数を追加（グローバルスコープで定義してください）
let translateX = 0;
let translateY = 0;


// 補助変数（グローバル定義）
let lastCenterX = 0;
let lastCenterY = 0;


brushBtn.addEventListener('click', () => setMode('brush'));
floodFillBtn.addEventListener('click', () => setMode('fill'));
eraserBtn.addEventListener('click', () => setMode('eraser'));
brushSizeInput.addEventListener('input', (e) => { brushSize = e.target.value; sizeValEl.textContent = brushSize; });
clearBtn.addEventListener('click', () => { if(confirm('クリアしますか？')) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); saveHistory(); }});
undoBtn.addEventListener('click', () => { if (historyIndex > 0) { historyIndex--; const img = new Image(); img.src = historyStack[historyIndex]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); }; updateHistoryButtons(); } });
redoBtn.addEventListener('click', () => { if (historyIndex < historyStack.length - 1) { historyIndex++; const img = new Image(); img.src = historyStack[historyIndex]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); }; updateHistoryButtons(); } });

// --- ファイルアップロード機能の修正（線画レイヤー化） ---
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            // 1. 線画レイヤー(lineCanvas)に画像を描画し、加工する
            lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            
            const ratio = Math.min(lineCanvas.width / img.width, lineCanvas.height / img.height);
            const drawW = img.width * ratio;
            const drawH = img.height * ratio;
            const offsetX = (lineCanvas.width - drawW) / 2;
            const offsetY = (lineCanvas.height - drawH) / 2;
            
            lineCtx.drawImage(img, offsetX, offsetY, drawW, drawH);
            
            // 2. 線画抽出ロジック（明るい部分を透明にし、線だけ残す）
            const imgData = lineCtx.getImageData(0, 0, lineCanvas.width, lineCanvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                if (avg > 200) { 
                    data[i+3] = 0; // 明るい背景を透明化
                } else {
                    data[i] = data[i+1] = data[i+2] = 0; // 線を黒に
                }
            }
            lineCtx.putImageData(imgData, 0, 0);
            
            // 3. ペン用キャンバス(paintCanvas)を白でリセット
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            saveHistory();
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// 16進数カラーをRGB配列に変換
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
}

// 塗りつぶしアルゴリズム（線画を境界として認識する）

function floodFill(startX, startY, fillColor) {
    const paintData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const lineData = lineCtx.getImageData(0, 0, lineCanvas.width, lineCanvas.height);
    
    const pData = paintData.data;
    const lData = lineData.data;
    
    const startIdx = (startY * canvas.width + startX) * 4;
    const targetColor = [pData[startIdx], pData[startIdx + 1], pData[startIdx + 2]];

    // 塗りたい色と同じなら何もしない
    if (targetColor[0] === fillColor[0] && targetColor[1] === fillColor[1] && targetColor[2] === fillColor[2]) return;

    const visited = new Uint8Array(canvas.width * canvas.height);
    const stack = [[startX, startY]];
    
    while (stack.length > 0) {
        const [x, y] = stack.pop();
        const idx = (y * canvas.width + x) * 4;
        
        if (visited[y * canvas.width + x]) continue;
        visited[y * canvas.width + x] = 1;

        // 境界線（アルファ値が強い場所は避ける）
        if (lData[idx + 3] > 128) continue; 

        // 【ここが重要】ターゲットの色と「現在見ているピクセルの色」が近いか判定
        const diff = Math.abs(pData[idx] - targetColor[0]) + 
                     Math.abs(pData[idx+1] - targetColor[1]) + 
                     Math.abs(pData[idx+2] - targetColor[2]);
        
        // 許容値50は大きすぎるかもしれません。10程度に下げてみてください
        if (diff > 10) continue; 

        // 塗りつぶし実行
        pData[idx] = fillColor[0];
        pData[idx+1] = fillColor[1];
        pData[idx+2] = fillColor[2];
        pData[idx+3] = 255;

        // 隣接チェック
        if (x + 1 < canvas.width) stack.push([x + 1, y]);
        if (x - 1 >= 0) stack.push([x - 1, y]);
        if (y + 1 < canvas.height) stack.push([x, y + 1]);
        if (y - 1 >= 0) stack.push([x, y - 1]);
    }
    
    ctx.putImageData(paintData, 0, 0);
    saveHistory();
}
// 末尾に追加
let longPressTimer = null;
// --- タッチ操作の一元管理（これだけ残す） ---
canvas.addEventListener('touchstart', (e) => {
    // 1. 2本指以上の時はピンチ操作へ
    if (e.touches.length >= 2) {
        isPinching = true;
        lastDist = getDistance(e.touches);
        lastCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        lastCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        if (touchTimer) clearTimeout(touchTimer);
    } 
    // 2. 1本指の時の処理
    else {
        isPinching = false;

        // ペンや塗りつぶしの場合は少し待ってから描画開始
        touchTimer = setTimeout(() => { 
            if (e.touches.length === 1) handleStart(e); 
        }, 50);
    }
}, {passive: false});


canvas.addEventListener('touchmove', (e) => {
    // 2. ピンチ操作（2本指での拡大・移動）
    if (e.touches.length >= 2) {
        e.preventDefault();

        // 今回の指の重心
        const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        // 1. 移動量の計算（前回の重心位置との差分）
        const deltaX = centerX - lastCenterX;
        const deltaY = centerY - lastCenterY;
        
        // 2. ピンチ倍率の計算
        const dist = getDistance(e.touches);
        const zoomDelta = dist / lastDist; // 変化率
        const newScale = Math.min(Math.max(scale * zoomDelta, 1), 3);
        const actualZoom = newScale / scale; // 実際に適用する拡大率

        // 3. 重心を基準にした移動と拡大の統合
        // 「移動」を足してから「拡大」を重心基準で行う
        translateX += deltaX;
        translateY += deltaY;
        
        translateX = centerX - (centerX - translateX) * actualZoom;
        translateY = centerY - (centerY - translateY) * actualZoom;
        
        scale = newScale;

        // 4. 移動制限（CSSの transform-origin: 0 0 に合わせる）
        const limitX = (canvas.width * scale - canvas.width);
        const limitY = (canvas.height * scale - canvas.height);
        translateX = Math.max(-limitX, Math.min(0, translateX));
        translateY = Math.max(-limitY, Math.min(0, translateY));

        // 5. 適用
        const transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        canvas.style.transform = lineCanvas.style.transform = transform;

        // 6. 次のフレームのために値を更新
        lastDist = dist;
        lastCenterX = centerX;
        lastCenterY = centerY;
    }

    // 3. 通常の描画（1本指）
    else if (!isPinching) {
        handleMove(e);
    }
}, {passive: false});




canvas.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) { isPinching = false; handleEnd(e); }
}, {passive: false});
